l_english:
 generic_war.1.t:0 "The Faction Is at War"
 generic_war.1.d:0 "Our faction leader, [Root.faction_leader.GetNameDef], is engaged in a major conflict against [event_target:war_target.GetNameDef]. As members of [Root.GetFactionName], we are expected to contribute to the war effort. Should we answer the call to arms?"
 generic_war.1.a:0 "We stand with our allies"
 generic_war.1.b:0 "This is not our fight"
 
 generic_war.2.t:0 "We Need Our Allies"
 generic_war.2.d:0 "Our war against [event_target:common_enemy.GetNameDef] grows more difficult each day. [event_target:potential_ally.GetNameDef], our fellow member of [Root.GetFactionName], has yet to commit forces. Perhaps we should formally request their assistance."
 generic_war.2.a:0 "Request their support"
 generic_war.2.b:0 "We can manage on our own"
 
 generic_war.3.t:0 "[From.GetNameDef] Requests Our Aid"
 generic_war.3.d:0 "[From.GetNameDef], our ally in [Root.GetFactionName], has requested our assistance in their war against [event_target:common_enemy.GetNameDef]. They argue that as fellow faction members, we have an obligation to stand together. Should we honor this request?"
 generic_war.3.a:0 "We will fight alongside them"
 generic_war.3.b:0 "We cannot commit at this time"
 
 generic_war.4.t:0 "[From.GetNameDef] Joins the Fight"
 generic_war.4.d:0 "Excellent news! [From.GetNameDef] has agreed to join our war effort against [event_target:common_enemy.GetNameDef]. With their support, victory is within reach."
 generic_war.4.a:0 "Together we are stronger"
 
 generic_war.5.t:0 "[From.GetNameDef] Refuses"
 generic_war.5.d:0 "[From.GetNameDef] has declined to join our war against [event_target:common_enemy.GetNameDef]. We will have to continue the fight without their support."
 generic_war.5.a:0 "Disappointing"
 
 refused_call_to_arms:0 "Refused Call to Arms"
 came_to_our_aid:0 "Came to Our Aid"

 generic_war.6.t:0 "An Ideological Target"
 generic_war.6.d:0 "Our faction has grown strong enough to consider expanding our influence. [event_target:ideological_target.GetNameDef] stands in our way - a nation whose ideology opposes everything we stand for. Our military is superior, and our people support action. The moment to strike has arrived."
 generic_war.6.a:0 "Justify a war of ideology"
 generic_war.6.b:0 "We are not ready yet"

  generic_war.7.t:0 "[From.GetNameDef] Justifies a War of Ideology"
  generic_war.7.d:0 "[From.GetNameDef], our faction leader, has begun justifying a war of ideology against [event_target:ideological_target.GetNameDef]. As members of [Root.GetFactionName], they expect us to support this expansion of our influence."
  generic_war.7.a:0 "We support our leader's vision"

 justified_ideological_war:0 "Justified Ideological War"

 generic_war.8.t:0 "The Arsenal of Democracy"
 generic_war.8.d:0 "The world grows darker by the day. [event_target:containment_target.GetNameDef], a nation of hostile ideology, grows ever more powerful. As the leader of the free world, [Root.GetNameDef] cannot stand idle while the forces of tyranny threaten global stability. The time has come to take a stand."
 generic_war.8.a:0 "We will contain this threat"
 generic_war.8.b:0 "We must prepare further"

 generic_war.9.t:0 "[From.GetNameDef] Declares a Containment War"
 generic_war.9.d:0 "[From.GetNameDef], our faction leader, has declared their intention to contain [event_target:containment_target.GetNameDef] and their hostile ideology. As members of [Root.GetFactionName], we are called to stand together in defense of our way of life."
 generic_war.9.a:0 "We stand with our leader"

 generic_war.10.t:0 "The Rival Faction"
 generic_war.10.d:0 "The world is divided between opposing ideologies, and [Root.GetNameDef] cannot ignore the growing power of a rival faction. [event_target:rival_faction.GetNameDef] leads an alliance that stands against everything we believe in. The time has come to settle this once and for all."
 generic_war.10.a:0 "Declare war on the rival faction"
 generic_war.10.b:0 "We are not ready yet"